services:
  scoring-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GITHUB_TOKEN: ${GITHUB_TOKEN}
    container_name: scoring-service
    ports:
      - "${SCORING_PORT}:7777"
    environment:
      PORT: 7777
      NODE_ENV: production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7777/health"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - scoring-net

networks:
  scoring-net:
    driver: bridge
